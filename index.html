<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>thagreatjoel · ship index</title>
  <meta name="description" content="Joel Joju — builder, creator, ship engineer. Live GitHub fleet.">
  <meta name="theme-color" content="#03050b">
  
  <!-- fonts: futuristic & clean -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #fbfdff;
      font-family: 'Space Grotesk', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      color: #0c1421;
      position: relative;
    }

    /* dynamic noise / subtle grain */
    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjciIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDMiLz48L3N2Zz4=');
      background-repeat: repeat;
      pointer-events: none;
      opacity: 0.2;
      z-index: 0;
    }

    /* main non-scroll container */
    .fleet-dashboard {
      height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 2;
      overflow: hidden;
      padding: 1.8rem 2rem 1.8rem 2rem;
    }

    /* header — ship bridge */
    .bridge {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 2rem;
      border-bottom: 1px solid #eef2f8;
      padding-bottom: 1rem;
    }

    .call-sign {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #2c5f8a;
      background: #f0f6fe;
      padding: 0.2rem 0.8rem;
      border-radius: 20px;
    }

    .stats-badge {
      display: flex;
      gap: 1.2rem;
    }

    .stat-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      background: white;
      border: 1px solid #e2eaf1;
      padding: 0.2rem 0.9rem;
      border-radius: 40px;
      color: #1e2f3f;
    }

    .stat-pill span {
      font-weight: 700;
      color: #111;
      margin-right: 0.3rem;
    }

    /* main content — cards grid (no scroll, fits inside) */
    .ship-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1.5rem;
      align-content: center;
      overflow-y: auto;
      padding: 0.5rem 0 1rem 0;
      max-height: calc(100vh - 130px);
    }

    /* custom scrollbar but never actually scrolls if content fits — safety */
    .ship-grid::-webkit-scrollbar {
      width: 3px;
      background: transparent;
    }
    .ship-grid::-webkit-scrollbar-thumb {
      background: #cbdde9;
      border-radius: 12px;
    }

    /* animated card — ship container */
    .ship-card {
      background: #ffffff;
      border-radius: 32px;
      border: 1px solid #eef2fc;
      padding: 1.3rem 1.4rem;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      animation: cardFloatUp 0.5s ease backwards;
      box-shadow: 0 5px 12px rgba(0, 0, 0, 0.02);
      backdrop-filter: blur(0px);
      display: flex;
      flex-direction: column;
    }

    .ship-card:hover {
      transform: translateY(-5px) scale(1.01);
      border-color: #bdd6e8;
      box-shadow: 0 25px 30px -16px rgba(0, 0, 0, 0.08);
    }

    /* card header with icon + name */
    .card-header {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-bottom: 0.9rem;
      flex-wrap: wrap;
    }
    .repo-icon {
      font-size: 1.6rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.02));
    }
    .repo-name {
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.3px;
      background: linear-gradient(135deg, #0f2027, #2c5f8a);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      word-break: break-word;
    }

    .repo-desc {
      font-size: 0.8rem;
      color: #3c4f6c;
      line-height: 1.45;
      margin-bottom: 1.2rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 2.8rem;
    }

    /* metrics row */
    .metrics {
      display: flex;
      gap: 1rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: #5d7188;
      margin-top: auto;
      border-top: 1px solid #edf2f8;
      padding-top: 0.8rem;
      align-items: center;
    }
    .metric {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }
    .star-icon, .fork-icon {
      font-size: 0.75rem;
    }

    .ship-status {
      margin-left: auto;
      background: #eaf5ea;
      padding: 0.2rem 0.55rem;
      border-radius: 40px;
      font-size: 0.6rem;
      font-weight: 600;
      color: #2b6e3c;
    }

    /* footer — launch button (next page later) */
    .launchpad {
      margin-top: 1.2rem;
      display: flex;
      justify-content: center;
      padding-top: 0.6rem;
      border-top: 1px solid #eef2f8;
    }

    .btn-shipyard {
      background: #0c1421;
      color: white;
      border: none;
      padding: 0.7rem 2rem;
      border-radius: 60px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.02em;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      transition: all 0.25s ease;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .btn-shipyard:hover {
      background: #1e2f3f;
      transform: translateY(-2px);
      box-shadow: 0 12px 20px -12px rgba(0, 0, 0, 0.2);
    }

    /* animations */
    @keyframes cardFloatUp {
      0% {
        opacity: 0;
        transform: translateY(22px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* loading overlay / skeleton */
    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255,255,245,0.92);
      backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
      font-family: monospace;
      gap: 0.5rem;
      transition: opacity 0.4s;
    }
    .loader-text {
      font-weight: 500;
      color: #1f3b4c;
      letter-spacing: 0.1em;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid #dce5ef;
      border-top: 2px solid #2c5f8a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* responsive: keep everything in one screen */
    @media (max-width: 720px) {
      .fleet-dashboard {
        padding: 1rem 1.2rem;
      }
      .ship-grid {
        gap: 1rem;
      }
      .bridge {
        flex-direction: column;
        gap: 0.6rem;
      }
    }

    /* no scroll guarantee */
    body, html {
      overflow: hidden;
      position: fixed;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div class="fleet-dashboard">
  <!-- bridge header -->
  <div class="bridge">
    <div class="call-sign">
      🚢 SHIP INDEX · thagreatjoel/fleet
    </div>
    <div class="stats-badge" id="liveStats">
      <div class="stat-pill"><span id="repoCount">—</span> vessels</div>
      <div class="stat-pill"><span id="totalStars">—</span> stars</div>
      <div class="stat-pill"><span id="totalForks">—</span> forks</div>
    </div>
  </div>

  <!-- dynamic card grid (GitHub repos) -->
  <div class="ship-grid" id="shipGrid">
    <!-- animated cards will be injected here via JS -->
    <div style="grid-column:1/-1; text-align:center; padding:2rem; color:#7f8fa4;">loading fleet manifest ...</div>
  </div>

  <!-- launch button (next page placeholder) -->
  <div class="launchpad">
    <button class="btn-shipyard" id="nextPageBtn">
      <span>⟶</span> ENTER SHIPYARD <span>⛵</span>
    </button>
  </div>
</div>

<script>
  // GitHub username
  const GITHUB_USER = "thagreatjoel";
  const API_REPOS = `https://api.github.com/users/${GITHUB_USER}/repos?sort=updated&per_page=20`;

  let repoDataCache = [];

  // helper: fetch with error handling
  async function fetchGitHubRepos() {
    try {
      const response = await fetch(API_REPOS, {
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!response.ok) throw new Error(`GitHub API status ${response.status}`);
      const repos = await response.json();
      // filter out forks if you want only own? keep all but show original ones (but we'll show all as ships)
      return Array.isArray(repos) ? repos : [];
    } catch (err) {
      console.warn(err);
      return null;
    }
  }

  // compute aggregated stats
  function computeStats(repos) {
    let stars = 0, forks = 0;
    repos.forEach(repo => {
      stars += repo.stargazers_count || 0;
      forks += repo.forks_count || 0;
    });
    return { stars, forks, count: repos.length };
  }

  // render cards with animation delay
  function renderShipGrid(repos) {
    const gridContainer = document.getElementById('shipGrid');
    if (!repos || repos.length === 0) {
      gridContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem; color:#7f8fa4;">⚡ no vessels found? make sure GitHub user exists & repos are public.</div>`;
      return;
    }

    // sort by updated (latest first)
    const sorted = [...repos].sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
    let cardsHTML = '';
    sorted.forEach((repo, idx) => {
      const name = repo.name;
      const description = repo.description || "no description yet — but it sails.";
      const stars = repo.stargazers_count || 0;
      const forks = repo.forks_count || 0;
      const language = repo.language || "code";
      const updatedAt = new Date(repo.updated_at).toLocaleDateString('en-US', { month:'short', day:'numeric' });
      
      // random icon based on language / fun
      let iconEmoji = "📦";
      if (language === "JavaScript") iconEmoji = "⚡";
      else if (language === "Python") iconEmoji = "🐍";
      else if (language === "TypeScript") iconEmoji = "🟦";
      else if (language === "HTML") iconEmoji = "🌐";
      else if (language === "C++") iconEmoji = "⚙️";
      else iconEmoji = "🚢";
      
      // status: recently updated / active
      const daysSinceUpdate = (new Date() - new Date(repo.updated_at)) / (1000 * 3600 * 24);
      let statusLabel = "docked";
      if (daysSinceUpdate < 14) statusLabel = "⚡ active sail";
      else if (daysSinceUpdate < 60) statusLabel = "🟢 cruising";
      else statusLabel = "⛵ anchored";
      
      cardsHTML += `
        <div class="ship-card" style="animation-delay: ${idx * 0.03}s">
          <div class="card-header">
            <div class="repo-icon">${iconEmoji}</div>
            <div class="repo-name">${escapeHtml(name)}</div>
          </div>
          <div class="repo-desc">${escapeHtml(description.length > 80 ? description.slice(0,80)+'...' : description)}</div>
          <div class="metrics">
            <div class="metric"><span class="star-icon">⭐</span> ${stars}</div>
            <div class="metric"><span class="fork-icon">⑂</span> ${forks}</div>
            <div class="metric">🔄 ${updatedAt}</div>
            <div class="ship-status">${statusLabel}</div>
          </div>
        </div>
      `;
    });
    gridContainer.innerHTML = cardsHTML;
  }

  // escape html
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // update stats counters
  function updateStatsUI(stats) {
    document.getElementById('repoCount').innerText = stats.count;
    document.getElementById('totalStars').innerText = stats.stars;
    document.getElementById('totalForks').innerText = stats.forks;
  }

  // loading state and fetch
  async function initFleet() {
    const gridContainer = document.getElementById('shipGrid');
    // show loading spinner inside grid
    gridContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem;"><div class="spinner" style="margin:0 auto;"></div><p style="margin-top:1rem; font-size:0.75rem;">syncing with GitHub orbit ...</p></div>`;
    
    const repos = await fetchGitHubRepos();
    if (!repos) {
      gridContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:2rem; color:#b91c1c;">⚠️ unable to load fleet — GitHub API limit or network. reload later.</div>`;
      document.getElementById('repoCount').innerText = 'ERR';
      return;
    }
    
    repoDataCache = repos;
    const stats = computeStats(repos);
    updateStatsUI(stats);
    renderShipGrid(repos);
  }

  // button redirect (next page placeholder)
  const nextBtn = document.getElementById('nextPageBtn');
  if (nextBtn) {
    nextBtn.addEventListener('click', () => {
      // This will lead to next page later; for now just gentle alert but you can replace with internal routing
      alert('🚀 Shipyard / next page coming soon — you will add full portfolio here later.');
      // window.location.href = "/shipyard.html";  // future link
    });
  }

  // start
  initFleet();

  // Optional: small refresh every 5 min? just to keep stats if needed (but fine)
  // ensure no scrolling on body
  document.body.style.overflow = 'hidden';
</script>

<!-- fallback style for dynamic content -->
<style>
  .ship-card {
    transition: all 0.2s ease;
  }
  .ship-card:hover .repo-name {
    background: linear-gradient(135deg, #0f2027, #1f6392);
    background-clip: text;
    -webkit-background-clip: text;
  }
  .btn-shipyard:active {
    transform: scale(0.97);
  }
</style>

</body>
</html>
